telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"

allowed_networks:
  - "127.0.0.0/8"
  - "192.168.1.0/24"
  - "100.64.0.0/10"

watch:
  ssh_success: true
  ssh_preauth: true
  nginx_suspicious: true
  cockpit_exposure: true
  service_exposure: true

logs:
  auth_log: "/var/log/auth.log"
  nginx_access_log: "/var/log/nginx/access.log"
  nginx_error_log: "/var/log/nginx/error.log"
  watchdog_log: "logs/security_watchdog.log"

service_exposure:
    enabled: true
    risky_ports:
      "9090": "Cockpit"
      "5000": "Flask app 5000"
      "5001": "Flask app 5001"
      "666": "darkstat"
      "111": "rpcbind"
      "139": "Samba NetBIOS"
      "445": "Samba SMB"
      "2049": "NFS"

samba:
  enabled: true
  log_dir: "/var/log/samba"
  alert_on_unknown_client_logs: true
  max_log_age_days: 7

services:
  exposed_allowed:
    - "22"
    - "80"
    - "443"

  monitored_ports:
    - "22"
    - "80"
    - "443"
    - "5000"
    - "5001"
    - "666"
    - "9090"
    - "111"
    - "139"
    - "445"
    - "2049"

nginx:
  suspicious_patterns:
    - ".git"
    - ".env"
    - ".aws"
    - ".ssh"
    - "id_rsa"
    - "credentials"
    - "wp-config"
    - "terraform"
    - ".htpasswd"

  unicode_detection:
    enabled: true
    alert_on_unicode: false

  alert_threshold: 10
  cooldown_minutes: 30
  cleanup_interval_seconds: 300
  tracked_ip_ttl_minutes: 60